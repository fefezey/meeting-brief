# Her push ve pull request'te kodun derlendiğini VE çalıştığını doğrular.
# Sonuç GitHub'da yeşil tik / kırmızı çarpı olarak görünür.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      # 1. Depoyu GitHub'ın sunucusuna indir
      - uses: actions/checkout@v4

      # 2. Node kur. Sürüm .nvmrc dosyasından okunuyor —
      #    böylece yerel ve CI aynı sürümü kullanır, "bende çalışıyordu"
      #    sorunları büyük ölçüde ortadan kalkar.
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      # 3. Bağımlılıkları kur.
      #    "npm ci" (install değil): package-lock.json'a birebir uyar,
      #    sürümleri kendiliğinden güncellemez — tekrarlanabilir kurulum.
      - run: npm ci

      # 4. Tip kontrolü: TypeScript ve Svelte hataları
      - run: npm run check

      # 5. Birim testleri (saf mantık, milisaniyeler)
      - run: npm run test:unit

      # 6. Üretim derlemesi gerçekten çalışıyor mu
      - run: npm run build

      # 7. Uçtan uca testler için tarayıcı kur.
      #    --with-deps: Linux'ta tarayıcının ihtiyaç duyduğu sistem
      #    kütüphanelerini de kurar (macOS'ta gerekmez, CI'da gerekir).
      - run: npx playwright install --with-deps chromium

      # 8. Uçtan uca testler: gerçek tarayıcıda tam akış.
      #    Örnek veri modunda çalışır (playwright.config.ts), yani
      #    CI hiçbir zaman gerçek AI'a istek atmaz — ücretsiz ve
      #    her seferinde aynı sonucu verir.
      - run: npm run test:e2e

      # 9. Test başarısız olursa ekran görüntüsü ve iz kaydını sakla.
      #    "if: failure()" -> sadece hata durumunda çalışır.
      #    Hatayı görmeden çözmek zordur; bu dosyalar GitHub'dan
      #    indirilebilir.
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7
