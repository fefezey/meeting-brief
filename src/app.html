<!doctype html>
<html lang="tr">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<!--
			TEMA TİTREMESİNİ ÖNLEYEN KOD

			Sayfa çizilmeden ÖNCE çalışması şart. Svelte bileşeni içinde
			yazsaydık, tarayıcı önce açık temayı çizer, sonra JavaScript
			karanlığa çevirirdi — kullanıcı bir anlık beyaz parlama görürdü.

			Sıra: kullanıcının kaydettiği tercih > işletim sistemi ayarı
		-->
		<script>
			(() => {
				// Karanlık VARSAYILAN: ürünün asıl kimliği koyu tema.
				// Kullanıcı açık temayı açıkça seçmediyse koyu kalır.
				const saved = localStorage.getItem('theme');
				if (saved !== 'light') {
					document.documentElement.classList.add('dark');
				}
			})();
		</script>
		<meta name="color-scheme" content="dark light" />
		<meta name="theme-color" content="#0f1115" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
