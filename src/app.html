<!doctype html>
<html lang="tr">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<!--
			TEMA TİTREMESİNİ ÖNLEYEN KOD

			Sayfa çizilmeden ÖNCE çalışması şart. Svelte bileşeni içinde
			yazsaydık, tarayıcı önce açık temayı çizer, sonra JavaScript
			karanlığa çevirirdi — kullanıcı bir anlık beyaz parlama görürdü.

			Sıra: kullanıcının kaydettiği tercih > işletim sistemi ayarı
		-->
		<script>
			(() => {
				const saved = localStorage.getItem('theme');
				const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
				if (saved === 'dark' || (!saved && prefersDark)) {
					document.documentElement.classList.add('dark');
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
